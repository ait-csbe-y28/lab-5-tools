syntax = "proto3";

package accounts;

option csharp_namespace = "Accounts.Kafka.Contracts";

message AccountCreationKey {
  int64 account_id = 1;
}

message AccountCreationValue {
  int64 user_id = 1;
  int64 account_id = 2;
  AccountType account_type = 3;
}

enum AccountType {
  ACCOUNT_TYPE_UNSPECIFIED = 0;
  ACCOUNT_TYPE_PERSONAL = 1;
  ACCOUNT_TYPE_CORPORATE = 2;
}
