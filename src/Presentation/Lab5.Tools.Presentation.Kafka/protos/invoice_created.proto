syntax = "proto3";

package invoices;

option csharp_namespace = "Invoices.Kafka.Contracts";

import "google/type/money.proto";

message InvoiceCreationKey {
  int64 invoice_id = 1;
}

message InvoiceCreationValue {
  int64 invoice_id = 1;
  int64 recipient_id = 2;
  int64 payer_id = 3;
  google.type.Money payment = 4;
}
