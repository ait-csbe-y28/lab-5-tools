syntax = "proto3";

package invoices;

option csharp_namespace = "Invoices.Grpc.Contracts";

service InvoiceService {
  rpc ApproveInvoice(ApproveInvoiceRequest) returns (ApproveInvoiceResponse);
  rpc DeclineInvoice(DeclineInvoiceRequest) returns (DeclineInvoiceResponse);
  rpc AssignAccountant(AssignAccountantRequest) returns (AssignAccountantResponse);
}

message ApproveInvoiceRequest {
  int64 invoice_id = 1;
  int64 user_id = 2;
}

message ApproveInvoiceResponse {}

message DeclineInvoiceRequest {
  int64 invoice_id = 1;
  int64 user_id = 2;
}

message DeclineInvoiceResponse {}

message AssignAccountantRequest {
  int64 invoice_id = 1;
  int64 user_id = 2;
}

message AssignAccountantResponse {
  
}
