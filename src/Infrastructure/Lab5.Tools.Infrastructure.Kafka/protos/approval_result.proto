syntax = "proto3";

package approvals;

option csharp_namespace = "ApprovalResult.Kafka.Contracts";

message ApprovalResultKey {
  int64 invoice_id = 1;
}

message ApprovalResultValue {
  int64 invoice_id = 1;
  ApprovalStatus status = 2;
}

enum ApprovalStatus {
  APPROVAL_STATUS_UNSPECIFIED = 0;
  APPROVAL_STATUS_APPROVED = 1;
  APPROVAL_STATUS_DECLINED = 2;
}
